<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Portal</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #bef264;
            --text-color: #ffffff;
            --device-bezel: #1a1a1a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Background Scribble */
        .scribble-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            z-index: -1;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Star Icon */
        .star-icon {
            position: fixed;
            top: 40px;
            right: 40px;
            color: var(--accent-color);
            z-index: 100;
        }

        /* Header Logo */
        header {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        /* Showcase Area */
        .showcase-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 100px 20px;
            width: 100%;
            max-width: 1400px;
            position: relative;
        }

        /* Device Card */
        .device-card {
            width: 280px;
            height: 580px;
            background: #222;
            border-radius: 50px;
            padding: 10px;
            position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            border: 2px solid #333;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            color: inherit;
        }

        .device-card:nth-child(1) { transform: scale(1.1) rotate(-2deg); z-index: 10; margin-right: -40px; }
        .device-card:nth-child(2) { transform: scale(0.95) rotate(1deg); z-index: 5; margin-right: -40px; margin-top: 60px; }
        .device-card:nth-child(3) { transform: scale(0.9) rotate(-1deg); z-index: 3; margin-right: -40px; margin-top: 100px; }
        .device-card:nth-child(4) { transform: scale(0.85) rotate(2deg); z-index: 1; margin-top: 140px; }

        .device-card:hover {
            transform: translateY(-30px) scale(1.15) rotate(0deg) !important;
            z-index: 100;
            border-color: var(--accent-color);
        }

        .device-screen {
            width: 100%;
            height: 100%;
            border-radius: 42px;
            background-color: #000;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            border: 2px solid #000;
        }

        .dynamic-island {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 24px;
            background: #000;
            border-radius: 20px;
            z-index: 50;
        }

        .screen-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            z-index: 30;
            text-align: center;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .app-desc {
            font-size: 0.8rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Bottom Browser Bar Mockup */
        .browser-bar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 24px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .showcase-area { flex-direction: column; gap: 40px; }
            .device-card { margin: 0 !important; transform: none !important; }
            header, .star-icon { position: relative; left: auto; right: auto; top: auto; margin: 20px 0; }
        }
    </style>
</head>
<body>
    <!-- Background Scribble SVG -->
    <svg class="scribble-bg" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 500C100 500 300 200 500 500C700 800 900 500 900 500" stroke="#bef264" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
        <path d="M200 800C200 800 400 600 600 800C800 1000 1000 800 1000 800" stroke="#bef264" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" opacity="0.1"/>
        <path d="M0 200C0 200 200 0 400 200C600 400 800 200 800 200" stroke="#bef264" stroke-width="50" stroke-linecap="round" stroke-linejoin="round" opacity="0.05"/>
    </svg>

    <div class="star-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L14.5 9H21.5L16 13.5L18.5 20.5L12 16L5.5 20.5L8 13.5L2.5 9H9.5L12 2Z"/>
        </svg>
    </div>

    <header>
        <div class="logo">Vibe</div>
    </header>

    <main class="showcase-area">
        <!-- Asset Manager -->
        <a href="Asset/asset.html" class="device-card">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-image: url('vibe_asset_final.png')">
                <div class="screen-overlay">
                    <h3 class="app-title">Asset</h3>
                    <p class="app-desc">Asset & Installment Flow</p>
                </div>
                <div class="browser-bar">vibestuff.com</div>
            </div>
        </a>

        <!-- Task Manager -->
        <a href="task/task-manager.html" class="device-card">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-image: url('vibe_task_final.png')">
                <div class="screen-overlay">
                    <h3 class="app-title">Task</h3>
                    <p class="app-desc">Smart Schedule & Mindmap</p>
                </div>
                <div class="browser-bar">vibestuff.com</div>
            </div>
        </a>

        <!-- Learn Hub -->
        <a href="learn/" class="device-card">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-image: url('vibe_learn_final.png')">
                <div class="screen-overlay">
                    <h3 class="app-title">Learn</h3>
                    <p class="app-desc">React & Vite Knowledge</p>
                </div>
                <div class="browser-bar">vibestuff.com</div>
            </div>
        </a>

        <!-- Hobby Labs -->
        <a href="hobby/" class="device-card">
            <div class="dynamic-island"></div>
            <div class="device-screen" style="background-image: url('vibe_hobby_final.png')">
                <div class="screen-overlay">
                    <h3 class="app-title">Hobby</h3>
                    <p class="app-desc">Music & Creative Lab</p>
                </div>
                <div class="browser-bar">vibestuff.com</div>
            </div>
        </a>
    </main>

    <footer style="position: absolute; bottom: 40px; left: 40px; font-weight: 900; font-size: 1.2rem; text-transform: uppercase; color: rgba(255,255,255,0.2);">
        Vibe Portal
    </footer>

    <script>
        // Optional: Hover sound or interaction logic could go here
    </script>
</body>
</html>
