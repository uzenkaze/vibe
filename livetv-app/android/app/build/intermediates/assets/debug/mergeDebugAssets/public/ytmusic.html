<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- TV 환경 감지 스크립트 -->
  <script>
    (function() {
      var w = window.screen ? window.screen.width : window.innerWidth;
      var h = window.screen ? window.screen.height : window.innerHeight;
      var ua = navigator.userAgent || '';
      var isMobileUA = /Mobile|Android.*Mobile|iPhone|iPod|IEMobile|BlackBerry|Opera Mini/i.test(ua);
      var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      var hasTVKeyword = /Android TV|SmartTV|SMART-TV|HbbTV|Tizen|WebOS|VIDAA|Vizio|Roku|Fire TV|TV Build|television/i.test(ua);
      var isTV = false;
      if (hasTVKeyword) {
        isTV = true;
      } else if (!isMobileUA && !isTouchDevice) {
        isTV = (w >= 1280 || (typeof window.matchMedia === 'function' && window.matchMedia('(device-width: 1920px)').matches) || (w > 0 && h > 0 && Math.max(w, h) >= 1280));
      }
      if (isMobileUA || isTouchDevice) {
        isTV = false;
      }
      if (isTV) {
        document.documentElement.classList.add('tv-mode');
        var meta = document.querySelector('meta[name=viewport]');
        if (meta) {
          meta.content = 'width=' + Math.max(w, 1280) + ', initial-scale=1.0, user-scalable=no';
        }
      }
      window.__IS_TV__ = isTV;
    })();
  </script>
  <title>PlayTime - YT Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/ytmusic-CN-q_wTM.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="./assets/ytmusic-DRLMY_Od.css">
</head>
<body>

  <div class="yt-sticky-top">
    <header class="glass-nav yt-header">
      <a href="index.html" class="yt-logo-link flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-tr from-amber-400 via-yellow-400 to-yellow-500 rounded-[12px] flex items-center justify-center flex-shrink-0">
          <div class="w-7 h-7 bg-zinc-900 rounded-[8px] flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3" fill="#fbbf24"/></svg></div>
        </div>
        <span class="yt-logo-text text-transparent bg-clip-text bg-gradient-to-r from-white via-yellow-100 to-amber-300 font-extrabold text-xl">PlayTime</span>
      </a>
      <div class="yt-search">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="검색" onkeydown="if(event.key==='Enter')searchMusic()">
        <button class="yt-search-btn" type="button" aria-label="검색" onclick="searchMusic()"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </div>
      <div class="yt-header-actions">
        <button id="login-ui-btn" class="yt-icon-btn" type="button" aria-label="로그인" onclick="openLoginModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>
    <div class="yt-cats" id="music-cat-tabs">
      <button class="yt-cat active" type="button" onclick="activatePill(this); loadTrending()">홈 (추천)</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); loadRecent()">최근 재생</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); loadLikedSongs()">좋아요</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); searchMusic('뉴진스')">K-Pop</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); searchMusic('팝송')">팝</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); searchMusic('인디음악')">인디</button>
      <button class="yt-cat" type="button" onclick="activatePill(this); searchMusic('발라드')">발라드</button>
    </div>
  </div>

  <!-- Content List -->
  <div class="loading-indicator" id="loading-indicator" style="display:none;">검색 중입니다...</div>
  <div class="music-list" id="music-list"></div>
  <div id="bottom-loading" style="display:none; text-align:center; padding: 20px; color: #aaa; font-size: 13px;">추가 노래를 불러오는 중...</div>
  <div id="scroll-anchor" style="height: 10px; width: 100%;"></div>

  <!-- Mini Player -->
  <div class="mini-player" id="mini-player" onclick="openFullPlayer()">
    <img src="" class="mini-thumb" id="mini-thumb" alt="thumbnail">
    <div class="mini-info">
      <div class="mini-title" id="mini-title">재생 중인 곡 없음</div>
      <div class="mini-artist" id="mini-artist"></div>
    </div>
    <div class="mini-controls">
      <button class="ctrl-btn" onclick="togglePlay(event)" id="play-pause-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff" id="icon-pause"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="playNext(); event.stopPropagation();" title="다음">
        <svg width="22" height="22" fill="#fff" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Full Player Overlay -->
  <div class="full-player" id="full-player">
    <!-- Full Player Header -->
    <div class="full-header">
      <button onclick="closeFullPlayer()" class="fp-close-btn" aria-label="닫기">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 8l8 8 8-8"/></svg>
      </button>
      <div class="full-header-tabs">
        <span class="active" id="tab-song" onclick="switchMode('song')">노래</span>
        <span id="tab-video" onclick="switchMode('video')">동영상</span>
      </div>
      <button class="fp-menu-btn" onclick="toggleDrawer()" aria-label="재생목록">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
    </div>

    <div class="full-player-main" id="full-player-main">
    <!-- Album Art / Video -->
    <div class="full-art-container" id="full-art-wrapper">
      <img id="full-art" src="" alt="Album Art">
      <div id="yt-player-container" class="video-mode-hidden">
        <div id="yt-player"></div>
      </div>
    </div>

    <!-- Song Info + Like -->
    <div class="full-info">
      <div class="full-info-left">
        <div class="full-title" id="full-title">Song Title</div>
        <div class="full-artist" id="full-artist">Artist</div>
      </div>
      <button class="like-btn" id="like-btn" onclick="toggleLike()" aria-label="좋아요">
        <svg id="like-icon" width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100" step="0.1">
      <div class="time-info">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- Main Controls: Shuffle | Prev | Play | Next | Repeat -->
    <div class="full-controls">
      <button class="ctrl-btn icon-btn" id="shuffle-btn" onclick="toggleShuffle(event)" aria-label="임의재생">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>
        </svg>
      </button>
      <button class="ctrl-btn icon-btn" onclick="playPrev()" aria-label="이전">
        <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-circle-btn" onclick="togglePlay(event)" id="full-play-btn" aria-label="재생/일시정지">
        <svg width="44" height="44" fill="currentColor" viewBox="0 0 24 24" id="full-icon-pause">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button class="ctrl-btn icon-btn" onclick="playNext()" aria-label="다음">
        <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <button class="ctrl-btn icon-btn" id="repeat-btn" onclick="toggleRepeat(event)" aria-label="반복재생">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="repeat-icon">
          <path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>
    </div> <!-- /full-player-main -->

    <!-- Bottom Sheet -->
    <div class="bottom-sheet" id="bottom-sheet">
      <!-- Bottom Tabs: 다음트랙 | 관련항목 -->
      <div class="full-bottom-tabs" id="full-bottom-tabs">
        <button class="bottom-tab-btn" id="btab-next" onclick="switchBottomTab('next', true)">다음 트랙</button>
        <button class="bottom-tab-btn" id="btab-related" onclick="switchBottomTab('related', true)">관련 항목</button>
      </div>

      <!-- Bottom Tab Content -->
      <div class="full-bottom-content" id="full-bottom-content">
        <!-- dynamically filled -->
      </div>
    </div>

  </div>

  <!-- Playlist Drawer (slides in from right) -->
  <div class="drawer-overlay hidden" id="drawer-overlay" onclick="toggleDrawer()"></div>
  <div class="playlist-drawer hidden" id="playlist-drawer">
    <div class="drawer-header">
      <h3>재생목록</h3>
      <button class="drawer-close" onclick="toggleDrawer()">✕</button>
    </div>
    <div class="drawer-content" id="drawer-list"></div>
  </div>

  <!-- Login Modal -->
  <div class="add-modal" id="login-modal">
    <div class="add-box">
      <h3>YouTube 로그인 안내</h3>
      <p>프리미엄 혜택(광고 제거) 및 뮤직 백그라운드 재생을 위해 유튜브 계정으로 로그인합니다.</p>
      <p style="font-size: 11px; color: #818cf8; margin-bottom: 16px; line-height: 1.4;">
        * 로그인 화면이 열리면 로그인을 진행해 주세요.<br>
        * 이미 로그인이 되어 있거나, 로그인을 완료하여 유튜브 메인 화면이 보인다면 <b>열려있는 해당 새 창(또는 탭)을 닫고 원래 앱 화면으로 돌아오시면</b> 혜택이 자동 적용됩니다.
      </p>
      <div class="add-actions">
        <button class="btn-cancel" onclick="closeLoginModal()">취소</button>
        <button class="btn-add" onclick="proceedYouTubeLogin()" style="background: #3b82f6;">로그인 하러가기</button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-bar">
    <button onclick="window.location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span style="font-size:10px; font-weight:700;">홈</span>
    </button>
    <button onclick="window.location.href='youtube.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>
      </svg>
      <span style="font-size:10px; font-weight:700;">유튜브</span>
    </button>
    <button class="active" onclick="window.location.href='ytmusic.html?v=8'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M12 12l3 3"/>
      </svg>
      <span style="font-size:10px; font-weight:700;">YT Music</span>
    </button>
    <button onclick="window.location.href='index.html?tab=favorites'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span style="font-size:10px; font-weight:700;">즐겨찾기</span>
    </button>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
