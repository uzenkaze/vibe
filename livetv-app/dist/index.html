<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- 강력한 모바일 브라우저 캐시 무효화 (Cache-Busting) 적용 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/png" href="./assets/favicon-CZKQBzCF.png" />
  <!-- 모바일 홈 화면 추가 및 즐겨찾기 북마크 타이틀 지정 -->
  <meta name="apple-mobile-web-app-title" content="PlayTime" />
  <meta name="application-name" content="PlayTime" />
  <link rel="manifest" href="./manifest.json" />
  <title>PlayTime</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .glass-nav {
      background: rgba(12, 12, 18, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* 모바일 플레이어 영역 고정 스타일 */
    .mobile-player-fixed {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: #000;
    }

    .cat-tab {
      white-space: nowrap;
      px: 1rem;
      py: 0.5rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .cat-tab.active {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    /* 모바일 가로 모드 최적화: 디바이스 해상도에 맞추고 잘림(Cropping) 방지 */
    @media (max-width: 1023px) and (orientation: landscape) {
      .mobile-player-fixed {
        position: relative !important;
      }
      #mobile-player-wrapper {
        height: calc(100dvh - 64px) !important; /* 헤더 높이 64px 제외 */
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background-color: #000 !important;
      }
      #mobile-player-wrapper > div {
        aspect-ratio: 16/9 !important;
        height: 100% !important;
        width: auto !important;
        max-width: 100vw !important;
      }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-rWE6Dl-R.js"></script>
</head>

<body class="h-[100dvh] overflow-hidden flex flex-col items-center justify-center bg-[#030307] p-0">

  <!-- Main Portal Device Container (PC 브라우저 가운데 정렬 및 스마트 셋톱/콘솔 룩) -->
  <div id="app-container" class="relative w-full h-[100dvh] lg:max-w-[1280px] xl:max-w-[1440px] bg-black rounded-none border-none lg:border-x lg:border-white/10 lg:shadow-[0_0_80px_rgba(99,102,241,0.08)] flex flex-col overflow-hidden mx-auto">

    <!-- Header -->
    <header class="glass-nav h-16 flex items-center justify-between px-6 z-50 flex-shrink-0 border-b border-white/10 bg-zinc-950/40 backdrop-blur-md">
      <!-- PlayTime Logo & Title -->
      <a href="index.html" class="flex items-center gap-3 group/logo cursor-pointer hover:opacity-90 transition-opacity">
        <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 via-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30 group-hover/logo:scale-105 transition-transform duration-300">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Z" />
            <path d="m9 8 6 4-6 4V8Z" fill="white" />
          </svg>
        </div>
        <span class="text-white font-extrabold text-xl tracking-tight drop-shadow-md">PlayTime</span>
      </a>

      <!-- Status Bar Area (Clock & Battery) -->
      <div class="flex items-center gap-4">
        <!-- Time (24h) -->
        <span id="status-time" class="text-sm font-bold text-white tracking-wider bg-white/5 px-2.5 py-1 rounded-lg border border-white/10 backdrop-blur-md">13:20</span>

        <!-- Battery Status Capsule -->
        <div class="lg:hidden flex items-center gap-2 bg-white/5 border border-white/10 px-2.5 py-1 rounded-lg backdrop-blur-md">
          <span id="battery-text" class="text-[11px] font-bold text-gray-400">88%</span>
          <div class="relative w-6 h-3.5 border border-white/40 rounded-sm p-[2px] flex items-center">
            <div id="battery-bar" class="bg-emerald-400 h-full rounded-[1px] transition-all duration-500" style="width: 88%;"></div>
            <div class="absolute -right-[3px] top-[4px] w-[2px] h-[4px] bg-white/40 rounded-r-[1px]"></div>
          </div>
        </div>
      </div>
    </header>

    <div class="flex-1 flex flex-col overflow-hidden">

      <!-- Main Content -->
      <main class="flex-1 flex flex-col bg-black relative overflow-hidden">

      <!-- PC Player -->
      <div id="video-container"
        class="hidden lg:flex w-full bg-black flex-col items-center justify-center flex-shrink-0 border-b border-white/5">
        
        <!-- TV Bezel Frame Container (TV 외관 모서리 라운드 & 그라데이션) - 여백 없이 꽉 찬 화면으로 변경 -->
        <div class="relative w-full aspect-video flex-shrink-0 group" id="video-bezel-frame">
          
          <!-- TV Stand/Bottom Decor (숨김 처리) -->
          <div class="hidden"></div>

          <!-- Inner Screen (내부 화면 영역) - 라운드 제거 및 여백 없이 꽉 차게 변경 -->
          <div id="video-inner-screen" class="w-full h-full overflow-hidden bg-black relative">
            <video id="main-video" class="w-full h-full object-contain hidden" playsinline></video>
            <iframe id="youtube-iframe-pc" class="w-full h-full absolute inset-0 hidden z-30" frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen></iframe>

            <div id="player-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-20">
              <div
                class="text-4xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 drop-shadow-lg">
                PlayGround</div>
              <div class="mt-4 text-sm text-gray-500 font-medium tracking-widest uppercase animate-pulse">Select a channel
              </div>
            </div>

            <!-- Custom Controls (PC) -->
            <div id="video-controls"
              class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/80 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-between z-40">
              <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                  <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                  <span class="text-[10px] font-bold tracking-widest text-white/80 uppercase">Live Stream</span>
                </div>
              </div>

              <div class="flex items-center gap-6">
                <!-- Volume -->
                <div class="flex items-center gap-3 group/vol">
                  <button id="vol-btn" class="text-white/70 hover:text-white transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 5 6 9H2v6h4l5 4V5z" />
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                    </svg>
                  </button>
                  <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="1"
                    class="w-20 h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>

                <!-- Quality Selection (화질 선택) -->
                <div class="relative" id="quality-select-pc-wrapper">
                  <button id="quality-btn" class="text-white/70 hover:text-white transition-colors flex items-center gap-1.5 text-[11px] font-bold bg-white/5 border border-white/10 px-2.5 py-1.5 rounded-xl backdrop-blur-md hover:bg-white/10" title="화질 선택">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                      <circle cx="12" cy="12" r="3"/>
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span id="quality-label">Auto</span>
                  </button>
                  <div id="quality-menu" class="hidden absolute bottom-10 right-0 mb-2 w-32 bg-zinc-950/95 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl overflow-hidden flex flex-col z-[100] p-1.5 gap-1 animate-fade-in">
                    <!-- Options dynamically loaded -->
                  </div>
                </div>

                <!-- Picture-in-Picture (Popup Play) -->
                <button id="pip-btn" class="text-white/70 hover:text-white transition-colors" title="팝업 플레이">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                    <rect x="13" y="11" width="7" height="5" rx="1" fill="currentColor" />
                  </svg>
                </button>

                <!-- Fullscreen -->
                <button id="fullscreen-btn" class="text-white/70 hover:text-white transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                      d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                  </svg>
                </button>
              </div>
            </div>
            <div id="loading-overlay"
              class="absolute inset-0 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center hidden z-50">
              <div class="w-10 h-10 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
              <span class="mt-4 text-sm font-bold text-white/70">연결 중...</span>
            </div>
            <div class="absolute bottom-6 left-6 flex items-center gap-3 z-10 pointer-events-none">
              <div id="now-playing-title" class="text-white font-bold text-lg drop-shadow-lg"></div>
            </div>
          </div> <!-- End Inner Screen -->
        </div> <!-- End Bezel Frame -->
      </div>

      <!-- PC Channels (Below Player) -->
      <div class="hidden lg:flex flex-col w-full bg-[#08080c] border-t border-white/5 overflow-y-auto no-scrollbar flex-1 pb-16">

        <div id="channel-grid" class="p-6 flex-1"></div>
      </div>

      <!-- Mobile Content -->
      <div class="lg:hidden flex flex-col h-full bg-black overflow-hidden">
        <!-- Player (Mobile) -->
        <div class="w-full bg-black flex-shrink-0 p-0" id="mobile-player-wrapper">
          <div class="relative w-full aspect-video flex-shrink-0 group/mob">
            
            <!-- TV Stand/Bottom Decor (숨김 처리) -->
            <div class="hidden"></div>

            <div class="mobile-player-fixed w-full h-full overflow-hidden bg-black relative">
              <video id="main-video-mobile" class="w-full h-full object-contain bg-black hidden" playsinline
                webkit-playsinline></video>
              <iframe id="youtube-iframe-mobile" class="w-full h-full absolute inset-0 hidden z-30" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>

              <!-- Custom Controls (Mobile) -->
              <div id="video-controls-mobile"
                class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover/mob:opacity-100 transition-opacity duration-300 flex items-center justify-between z-40">
                <div class="flex items-center gap-4">
                  <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></div>
                  <span class="text-[9px] font-bold text-white/80 uppercase tracking-tighter">Live</span>
                </div>
                <div class="flex items-center gap-4">
                  <button id="vol-btn-mobile" class="text-white/70">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 5 6 9H2v6h4l5 4V5z" />
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                    </svg>
                  </button>
                  
                  <!-- Quality Selection (화질 선택 Mobile) -->
                  <div class="relative" id="quality-select-mob-wrapper">
                    <button id="quality-btn-mobile" class="text-white/70 flex items-center gap-1 text-[9px] font-bold bg-white/5 border border-white/10 px-2 py-1 rounded-lg backdrop-blur-md" title="화질 선택">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                      </svg>
                      <span id="quality-label-mobile">Auto</span>
                    </button>
                    <div id="quality-menu-mobile" class="hidden absolute bottom-8 right-0 mb-2 w-28 bg-zinc-950/95 backdrop-blur-xl border border-white/10 rounded-xl shadow-2xl overflow-hidden flex flex-col z-[100] p-1 gap-1">
                      <!-- Options dynamically loaded -->
                    </div>
                  </div>

                  <!-- Picture-in-Picture (Popup Play) -->
                  <button id="pip-btn-mobile" class="text-white/70" title="팝업 플레이">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="2" y="4" width="20" height="16" rx="2" />
                      <rect x="13" y="11" width="7" height="5" rx="1" fill="currentColor" />
                    </svg>
                  </button>

                  <button id="fullscreen-btn-mobile" class="text-white/70">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path
                        d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                    </svg>
                  </button>
                </div>
              </div>

              <div id="player-placeholder-mobile"
                class="absolute inset-0 flex flex-col items-center justify-center bg-black z-20">
                <div
                  class="text-3xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 drop-shadow-lg">
                  PlayGround</div>
                <div class="mt-2 text-xs text-gray-500 font-medium tracking-widest uppercase animate-pulse">Select a channel
                </div>
              </div>
              <div class="absolute bottom-4 left-4 z-10 pointer-events-none">
                <h2 id="now-playing-title-mobile" class="text-white font-bold text-sm drop-shadow-md"></h2>
              </div>
            </div>
          </div>
        </div>

        <!-- Category Tabs -->
        <div class="p-4 overflow-x-auto no-scrollbar flex items-center gap-2 flex-shrink-0" id="category-tabs-mobile">
        </div>

        <!-- Channel List -->
        <div id="channel-grid-mobile" class="flex-1 px-0 pb-24 overflow-y-auto no-scrollbar"></div>
      </div>

    </main>
  </div>

  <!-- Sticky Bottom Navigation Bar (고정바) -->
  <div class="absolute bottom-0 inset-x-0 h-16 bg-zinc-950/80 backdrop-blur-lg border-t border-white/10 z-50 flex items-center justify-around px-6 pb-safe">
    <!-- 홈 (Home) -->
    <button onclick="parent.navigateTo('home.html')" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer group">
      <svg class="group-hover:scale-105 transition-transform" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="text-[10px] font-bold">홈</span>
    </button>

    <!-- 실시간 TV (Live) -->
    <button onclick="window.switchTab('live')" id="tab-btn-live" class="flex flex-col items-center gap-1 text-indigo-400 transition-colors cursor-pointer group">
      <svg class="group-hover:scale-105 transition-transform" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Z" />
        <path d="m9 8 6 4-6 4V8Z" />
      </svg>
      <span class="text-[10px] font-bold">실시간</span>
    </button>

    <!-- 유튜브 (YouTube) -->
    <button onclick="window.switchTab('youtube')" id="tab-btn-youtube" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer group">
      <svg class="group-hover:scale-105 transition-transform" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 11.5a29 29 0 0 0 .46 5.08 2.78 2.78 0 0 0 1.95 1.96c1.71.46 8.59.46 8.59.46s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 11.5a29 29 0 0 0-.46-5.08z"/>
        <polygon points="9.75 15.02 15.5 11.5 9.75 7.98 9.75 15.02"/>
      </svg>
      <span class="text-[10px] font-bold">유튜브</span>
    </button>

    <!-- 즐겨찾기 (Favorites) -->
    <button onclick="window.switchTab('favorites')" id="tab-btn-favorites" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors cursor-pointer group">
      <svg class="group-hover:scale-105 transition-transform" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span class="text-[10px] font-bold">즐겨찾기</span>
    </button>
  </div>

  </div> <!-- End app-container -->

</body>
