  <meta charset="UTF-8" />
  <!-- 시스템 진단 로그 수집기 -->
  <script>
    (function() {
      window.__LOGS__ = [];
      try {
        var cached = localStorage.getItem('playtime_debug_logs');
        if (cached) window.__LOGS__ = JSON.parse(cached).slice(-80);
      } catch(e) {}

      function addLog(type, msg) {
        var time = new Date().toLocaleTimeString();
        var logEntry = "[" + time + "] [" + type + "] " + msg;
        window.__LOGS__.push(logEntry);
        if (window.__LOGS__.length > 150) window.__LOGS__.shift();
        try {
          localStorage.setItem('playtime_debug_logs', JSON.stringify(window.__LOGS__));
        } catch(e) {}
        
        var el = document.getElementById('debug-log-content');
        if (el) {
          var div = document.createElement('div');
          div.className = 'py-0.5 border-b border-white/5 text-[10px] text-gray-300 font-mono break-all';
          div.textContent = logEntry;
          el.appendChild(div);
          el.scrollTop = el.scrollHeight;
        }
      }

      window.__addLog = addLog;

      var originalLog = console.log;
      var originalWarn = console.warn;
      var originalError = console.error;

      console.log = function() {
        var args = Array.prototype.slice.call(arguments);
        originalLog.apply(console, args);
        addLog('LOG', args.join(' '));
      };
      console.warn = function() {
        var args = Array.prototype.slice.call(arguments);
        originalWarn.apply(console, args);
        addLog('WARN', args.join(' '));
      };
      console.error = function() {
        var args = Array.prototype.slice.call(arguments);
        originalError.apply(console, args);
        addLog('ERROR', args.join(' '));
      };

      window.onerror = function(message, source, lineno, colno, error) {
        var msg = message + " at " + (source || 'unknown') + ":" + lineno + ":" + colno;
        addLog('CRITICAL', msg);
        return false;
      };

      window.onunhandledrejection = function(event) {
        addLog('REJECTION', event.reason ? String(event.reason) : 'Promise rejected');
      };
    })();
  </script>
  <!-- TV/빔프로젝터: initial-scale을 고정하지 않고 device-width 기준으로 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- TV 환경 감지 스크립트: DOM 생성 전에 실행하여 클래스 적용 -->
  <script>
    (function() {
      var w = window.screen ? window.screen.width : window.innerWidth;
      var h = window.screen ? window.screen.height : window.innerHeight;
      var ua = navigator.userAgent || '';
      
      // 모바일 디바이스 여부 강력히 판단 (터치 장치 및 모바일 UA)
      var isMobileUA = /Mobile|Android.*Mobile|iPhone|iPod|IEMobile|BlackBerry|Opera Mini/i.test(ua);
      var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
      
      // 명확한 TV 기기 키워드 탐색
      var hasTVKeyword = /Android TV|SmartTV|SMART-TV|HbbTV|Tizen|WebOS|VIDAA|Vizio|Roku|Fire TV|TV Build|television/i.test(ua);
      
      // TV/빔프로젝터 감지 조건:
      // 모바일 UA가 아니며 터치 기기가 아님을 기본 전제로 하고, TV 키워드가 있거나 대화면 데스크톱 스타일이어야 함.
      var isTV = false;
      
      if (hasTVKeyword) {
        isTV = true;
      } else if (!isMobileUA && !isTouchDevice) {
        // 모바일/터치 기기가 아닌 순수 대화면 스마트TV / 빔프로젝터 환경 타겟
        isTV = (
          w >= 1280 ||
          (typeof window.matchMedia === 'function' && window.matchMedia('(device-width: 1920px)').matches) ||
          (w > 0 && h > 0 && Math.max(w, h) >= 1280)
        );
      }
      
      // Z플립, 갤럭시 울트라 등 고해상도 스마트폰인 경우 절대 TV 모드로 오동작하지 않도록 완벽히 방어 차단
      if (isMobileUA || isTouchDevice) {
        isTV = false;
      }
      
      // TV 감지 시 html 태그에 클래스 추가하여 CSS에서 활용
      if (isTV) {
        document.documentElement.classList.add('tv-mode');
        // CSS 뷰포트를 1024px 이상으로 강제 인식하게 만들기
        // (Tailwind의 lg: 브레이크포인트 활성화)
        var meta = document.querySelector('meta[name=viewport]');
        if (meta) {
          // TV 실제 해상도에 맞게 width를 지정
          meta.content = 'width=' + Math.max(w, 1280) + ', initial-scale=1.0, user-scalable=no';
        }
      }
      window.__IS_TV__ = isTV;
    })();
  </script>

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #000;

      margin: 0;
      padding: 0;
    }

    .no-scrollbar::-webkit-scrollbar {

    }

      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: calc(env(safe-area-inset-top, 0px) - 2px) !important;
      padding-bottom: 10px !important;
      height: calc(4rem + env(safe-area-inset-top)) !important;
    }

    @media (max-width: 1023px) {
      .glass-nav {
        padding-top: calc(env(safe-area-inset-top, 0px) + 18px) !important;
        padding-bottom: 10px !important;
        height: calc(4.5rem + env(safe-area-inset-top)) !important;
      }
    }

    /* 모바일 플레이어 영역 고정 스타일 */
    .mobile-player-fixed {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: #000;
    }

    .cat-tab {
      white-space: nowrap;
      px: 1rem;
      py: 0.5rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .cat-tab.active {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    /* 모바일 가로 모드 최적화: 디바이스 해상도에 맞추고 잘림(Cropping) 방지 */
    @media (max-width: 1023px) and (orientation: landscape) {
      .mobile-player-fixed {
        position: relative !important;
      }
      #mobile-player-wrapper {
        height: calc(100dvh - 64px) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background-color: #000 !important;
      }
      #mobile-player-wrapper > div {
        aspect-ratio: 16/9 !important;
        height: 100% !important;
        width: auto !important;
        max-width: 100vw !important;
      }
    }

    /* ============================================================
       TV / 빔프로젝터 전용 레이아웃
       html.tv-mode 클래스가 붙으면 PC 레이아웃을 강제 적용
    ============================================================ */
    html.tv-mode body {
      overflow: hidden;
    }

    /* TV 모드: 모바일 전용 영역 숨기고 PC 영역 표시 */
    html.tv-mode #app-container .lg\:hidden {
      display: none !important;
    }
    html.tv-mode #app-container .hidden.lg\:flex {
      display: flex !important;
    }
    html.tv-mode #app-container .hidden.lg\:block {
      display: block !important;
    }

    /* TV 모드: 채널 그리드 폰트/카드 크기 TV 화면에 최적화 */
    html.tv-mode .channel-card {
      width: 11rem !important;
    }
    html.tv-mode .channel-row {
      gap: 16px !important;
      padding: 0 20px 20px !important;
    }
    html.tv-mode #video-container {
      height: 55dvh !important;
      max-height: 55dvh !important;
    }
    html.tv-mode #channel-grid,
    html.tv-mode #channel-grid-mobile {
      padding: 16px 20px 80px !important;
    }

    /* TV 모드: 하단 네비게이션 바 TV 스타일 */
    html.tv-mode .absolute.bottom-0 {
      height: 3.5rem !important;
    }
    html.tv-mode .absolute.bottom-0 span {
      font-size: 11px !important;
    }

    /* TV 모드: 전체 앱 최대 너비 제한 해제 (TV는 항상 전체 화면) */
    html.tv-mode #app-container {
      max-width: 100vw !important;
      border: none !important;
      box-shadow: none !important;
    }
  </style>

  <script>
    function safeNavigate(url) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'NAVIGATE', url: url }, '*');
          return;
        }
      } catch (e) {
        console.warn('[PlayTime] postMessage navigation failed:', e);
      }
      try {
        if (window.parent && typeof window.parent.navigateTo === 'function') {
          window.parent.navigateTo(url);
          return;
        }
      } catch (e) {
        console.warn('[PlayTime] Direct parent navigation failed:', e);
      }
      let targetUrl = url;
      if (window.location.pathname.includes('/livetv-app/') || window.location.pathname.includes('/livetv/')) {
        targetUrl = '../' + url;
      }
      window.location.href = targetUrl;
    }

    // 24시간 시계
    (function() {
      function updateClock() {
        var el = document.getElementById('header-clock');
        if (!el) return;
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        el.textContent = h + ':' + m;
      }
      updateClock();
      setInterval(updateClock, 1000);
    })();

    // 배터리 잔량 표시
    (function() {
      function updateBattery(battery) {
        var pct = Math.round(battery.level * 100);
        var fill = document.getElementById('battery-fill');
        var charging = document.getElementById('battery-charging');
        var body = document.getElementById('battery-body');
        if (!fill) return;

        fill.style.width = pct + '%';

        // 잔량에 따른 색상
        if (pct <= 20) {
          fill.style.background = 'rgba(239,68,68,0.9)';
        } else if (pct <= 50) {
          fill.style.background = 'rgba(251,191,36,0.9)';
        } else {
          fill.style.background = 'rgba(74,222,128,0.9)';
        }

        // 충전 중일 때만 번개 아이콘 표시
        if (charging) charging.style.display = battery.charging ? 'inline' : 'none';
        if (body) body.style.borderColor = battery.charging
          ? 'rgba(250,204,21,0.7)' : 'rgba(255,255,255,0.55)';
      }

      if (navigator.getBattery) {
        navigator.getBattery().then(function(battery) {
          updateBattery(battery);
          battery.addEventListener('levelchange', function() { updateBattery(battery); });
          battery.addEventListener('chargingchange', function() { updateBattery(battery); });
        }).catch(function() {
          var el = document.getElementById('header-battery');
          if (el) el.style.display = 'none';
        });
      } else {
        var el = document.getElementById('header-battery');
        if (el) el.style.display = 'none';
      }
    })();

    // 앱 실행 시 (네이티브 앱 환경일 때) 시계와 배터리 표시부 숨김 처리
    (function() {
      var isNative = (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) ||
                     (window.location.hostname === 'localhost' && window.location.port === '') || 
                     window.location.protocol === 'capacitor:';
      if (isNative) {
        var container = document.getElementById('header-status-container');
        if (container) container.style.display = 'none';
      }
    })();
  </script>

        <button onclick="window.__clearLogs()" class="px-4 py-2 bg-white/5 border border-white/10 hover:bg-white/10 text-gray-300 hover:text-white rounded-xl text-xs font-bold transition-all active:scale-95">로그 초기화</button>
        <button onclick="window.__copyLogs()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold shadow-lg shadow-indigo-600/30 transition-all active:scale-95">로그 복사</button>
      </div>
    </div>

  <script>
    window.__clearLogs = function() {
      try {
        localStorage.removeItem('playtime_debug_logs');
        window.__LOGS__ = [];
        var el = document.getElementById('debug-log-content');
        if (el) el.innerHTML = '';
        alert('진단 로그가 초기화되었습니다.');
      } catch(e) {}
    };

    window.__copyLogs = function() {
      try {
        var logsText = (window.__LOGS__ || []).join('\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(logsText).then(function() {
            alert('진단 로그가 클립보드에 복사되었습니다.');
          }).catch(function() {
            fallbackCopyText(logsText);
          });
        } else {
          fallbackCopyText(logsText);
        }
      } catch(e) {
        alert('복사 실패: ' + e.message);
      }
    };

    function fallbackCopyText(text) {
      var textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        document.execCommand('copy');
        alert('진단 로그가 클립보드에 복사되었습니다. (폴백)');
      } catch (err) {
        alert('복사 실패 (폴백): ' + err.message);
      }
      document.body.removeChild(textArea);
    }

    document.addEventListener('DOMContentLoaded', function() {
      var el = document.getElementById('debug-log-content');
      if (el && window.__LOGS__) {
        el.innerHTML = '';
        window.__LOGS__.forEach(function(log) {
          var div = document.createElement('div');
          div.className = 'py-0.5 border-b border-white/5 text-[10px] text-gray-300 font-mono break-all';
          div.textContent = log;
          el.appendChild(div);
        });
        el.scrollTop = el.scrollHeight;
      }
    });
  </script>
