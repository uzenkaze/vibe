<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Han's Play - Live TV</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 0; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-nav { background: rgba(12, 12, 18, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    /* 모바일 플레이어 영역 고정 스타일 */
    .mobile-player-fixed { position: sticky; top: 0; z-index: 100; width: 100%; background: #000; }
    .cat-tab { white-space: nowrap; px: 1rem; py: 0.5rem; border-radius: 9999px; font-size: 0.875rem; transition: all 0.2s; background: rgba(255,255,255,0.05); color: #9ca3af; margin-right: 8px; flex-shrink: 0; }
    .cat-tab.active { background: #fff; color: #000; font-weight: 600; }
  </style>
  <script type="module" crossorigin src="./assets/index-B_cTV5iO.js"></script>
</head>
<body class="min-h-screen flex flex-col bg-black overflow-x-hidden">

  <!-- Header -->
  <header class="glass-nav h-16 flex items-center justify-between px-6 z-50 flex-shrink-0">
    <a href="index.html" class="flex items-center gap-3 group/logo cursor-pointer hover:opacity-80 transition-opacity">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 group-hover/logo:scale-105 transition-transform">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8Z"/><path d="m9 8 6 4-6 4V8Z"/></svg>
      </div>
      <div>
        <h1 class="text-white font-extrabold text-lg tracking-tight">Han's <span class="text-indigo-400">Play</span></h1>
        <p class="text-[10px] text-gray-500 font-medium uppercase tracking-widest">Premium Live Portal</p>
      </div>
    </a>
    <button onclick="handleYouTubeLogin()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-full text-xs font-bold transition-all shadow-lg shadow-red-600/20">
      <svg width="18" height="12" viewBox="0 0 24 17" fill="white"><path d="M23.5 2.5a3 3 0 0 0-2.1-2.1C19.5 0 12 0 12 0S4.5 0 2.6.4A3 3 0 0 0 .5 2.5C0 4.4 0 8.5 0 8.5s0 4.1.5 6a3 3 0 0 0 2.1 2.1C4.5 17 12 17 12 17s7.5 0 9.4-.4a3 3 0 0 0 2.1-2.1C24 12.6 24 8.5 24 8.5s0-4.1-.5-6zM9.5 12V5l6.5 3.5L9.5 12z"/></svg>
      YouTube
    </button>
  </header>

  <div class="flex-1 flex flex-col lg:flex-row overflow-hidden lg:overflow-visible">
    
    <!-- Sidebar (PC) -->
    <aside class="hidden lg:flex w-80 flex-col border-r border-white/5 bg-[#0a0a0f] overflow-hidden flex-shrink-0">
      <div class="p-4 overflow-x-auto no-scrollbar flex items-center gap-2" id="category-tabs-pc"></div>
      <div id="channel-grid" class="flex-1 overflow-y-auto no-scrollbar p-2"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-black relative">
      
      <!-- PC Player -->
      <div id="video-container" class="hidden lg:flex flex-1 flex-col bg-black overflow-y-auto no-scrollbar">
        <div class="relative w-full aspect-video bg-black group">
          <video id="main-video" class="w-full h-full object-contain hidden" playsinline></video>
          <iframe id="youtube-iframe-pc" class="w-full h-full absolute inset-0 hidden z-30" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <div id="player-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-20">
             <div class="text-4xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 drop-shadow-lg">PlayGround</div>
             <div class="mt-4 text-sm text-gray-500 font-medium tracking-widest uppercase animate-pulse">Select a channel</div>
          </div>
          
          <!-- Custom Controls (PC) -->
          <div id="video-controls" class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/80 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-between z-40">
            <div class="flex items-center gap-6">
              <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold tracking-widest text-white/80 uppercase">Live Stream</span>
              </div>
            </div>
            
            <div class="flex items-center gap-6">
              <!-- Volume -->
              <div class="flex items-center gap-3 group/vol">
                <button id="vol-btn" class="text-white/70 hover:text-white transition-colors">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                </button>
                <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="1" class="w-20 h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-indigo-500">
              </div>
              
              <!-- Fullscreen -->
              <button id="fullscreen-btn" class="text-white/70 hover:text-white transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              </button>
            </div>
          </div>
          <div id="loading-overlay" class="absolute inset-0 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center hidden z-50">
             <div class="w-10 h-10 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
             <span class="mt-4 text-sm font-bold text-white/70">연결 중...</span>
          </div>
          <div class="absolute bottom-6 left-6 flex items-center gap-3 z-10 pointer-events-none">
            <div id="now-playing-title" class="text-white font-bold text-lg drop-shadow-lg"></div>
          </div>
        </div>
      </div>

      <!-- Mobile Content -->
      <div class="lg:hidden flex flex-col h-full bg-black">
        <!-- Player (Mobile) -->
        <div class="mobile-player-fixed aspect-video flex items-center justify-center overflow-hidden border-b border-white/10 group/mob relative">
          <video id="main-video-mobile" class="w-full h-full object-contain bg-black hidden" playsinline webkit-playsinline></video>
          <iframe id="youtube-iframe-mobile" class="w-full h-full absolute inset-0 hidden z-30" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          
          <!-- Custom Controls (Mobile) -->
          <div id="video-controls-mobile" class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover/mob:opacity-100 transition-opacity duration-300 flex items-center justify-between z-40">
            <div class="flex items-center gap-4">
              <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></div>
              <span class="text-[9px] font-bold text-white/80 uppercase tracking-tighter">Live</span>
            </div>
            <div class="flex items-center gap-4">
              <button id="vol-btn-mobile" class="text-white/70">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              </button>
              <button id="fullscreen-btn-mobile" class="text-white/70">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
              </button>
            </div>
          </div>

          <div id="player-placeholder-mobile" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-20">
             <div class="text-3xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 drop-shadow-lg">PlayGround</div>
             <div class="mt-2 text-xs text-gray-500 font-medium tracking-widest uppercase animate-pulse">Select a channel</div>
          </div>
          <div class="absolute bottom-4 left-4 z-10 pointer-events-none">
            <h2 id="now-playing-title-mobile" class="text-white font-bold text-sm drop-shadow-md"></h2>
          </div>
        </div>
        
        <!-- Category Tabs -->
        <div class="p-4 overflow-x-auto no-scrollbar flex items-center gap-2 flex-shrink-0" id="category-tabs-mobile"></div>
        
        <!-- Channel List -->
        <div id="channel-grid-mobile" class="flex-1 px-0 pb-24"></div>
      </div>

    </main>
  </div>

</body>
</html>
