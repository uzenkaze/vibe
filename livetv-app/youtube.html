<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob: https://*.ytimg.com https://*.youtube.com https://i.ytimg.com https://i3.ytimg.com https://img.youtube.com; media-src * data: blob:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PlayTime - YouTube</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0f0f0f;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:80px;}
    /* Home header (glass-nav) - same safe-area / status bar spacing */
    .glass-nav{
      background:rgba(12,12,18,0.8);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      padding-top:calc(env(safe-area-inset-top,0px) + 8px)!important;
      height:calc(4rem + env(safe-area-inset-top,0px))!important;
      box-sizing:border-box;
    }
    @media (max-width:1023px){
      .glass-nav{
        padding-top:calc(env(safe-area-inset-top,0px) + 28px)!important;
        height:calc(4.5rem + env(safe-area-inset-top,0px))!important;
      }
    }
    .yt-sticky-top{position:sticky;top:0;z-index:100;background:rgba(12,12,18,0.95);border-bottom:1px solid rgba(255,255,255,0.08)}
    .yt-header{display:flex;align-items:center;gap:10px;padding:0 12px 0 16px;flex-shrink:0;width:100%;min-width:0}
    .yt-logo-link{flex-shrink:0;text-decoration:none}
    .yt-logo-text{white-space:nowrap}
    .yt-search{flex:1 1 0;min-width:0;max-width:none;margin:0;display:flex;align-items:center;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden;height:36px;padding:0 12px;gap:8px}
    .yt-search svg{flex-shrink:0;color:#aaa}
    .yt-search input{flex:1;min-width:0;background:transparent;border:none;outline:none;padding:8px 0;color:#fff;font-size:14px;font-family:inherit}
    .yt-search input::placeholder{color:#777}
    .yt-search-btn{padding:4px;background:transparent;border:none;color:#aaa;cursor:pointer;display:flex;align-items:center;flex-shrink:0}
    .yt-header-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:0}
    .yt-icon-btn{background:transparent;border:none;color:#fff;display:flex;align-items:center;justify-content:center;padding:6px;cursor:pointer;flex-shrink:0;border-radius:50%;width:36px;height:36px}
    .yt-icon-btn:hover{background:rgba(255,255,255,0.08)}
    .yt-icon-btn-add{background:rgba(255,0,0,0.9)}
    .yt-icon-btn-add:hover{background:#ff0000}
    .yt-cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
    .yt-cats::-webkit-scrollbar{display:none}
    .yt-cat{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;background:rgba(255,255,255,0.08);color:#ccc}
    .yt-cat.active{background:#fff;color:#0f0f0f;font-weight:700}
    .yt-main{padding:16px}
    .yt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px 16px}
    @media(max-width:640px){
      .yt-grid{grid-template-columns:1fr;gap:0}
      .yt-header{gap:8px;padding:0 10px;overflow:hidden}
      .yt-logo-text{display:none}
      .yt-logo-link .w-10{width:2rem;height:2rem}
      .yt-search{height:34px;padding:0 10px}
      .yt-search input{font-size:13px}
      .yt-icon-btn{width:34px;height:34px;padding:5px}
    }
    .yt-card{cursor:pointer;border-radius:12px;overflow:hidden;transition:transform .15s}
    .yt-card:hover{transform:scale(1.02)}
    .yt-thumb{position:relative;aspect-ratio:16/9;background:#1a1a1a;border-radius:10px;overflow:hidden;margin-bottom:10px}
    .yt-thumb-fallback{position:absolute;inset:0;background:linear-gradient(135deg,#1e1b4b,#0f172a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#818cf8;font-size:11px;font-weight:800;z-index:1}
    .yt-thumb img,.yt-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;border-radius:10px}
    .yt-card-info{display:flex;gap:10px;padding:0 4px}
    .yt-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:#333;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
    .yt-meta{flex:1;min-width:0}
    .yt-title{font-size:14px;font-weight:600;line-height:1.4;color:#f1f1f1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
    .yt-ch-name{font-size:12px;color:#aaa;margin-bottom:2px}
    .yt-info-row{font-size:12px;color:#777}
    .yt-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:16px;color:#555}
    .yt-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.08);border-top-color:#FF0000;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .yt-player-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.95);flex-direction:column}
    .yt-player-overlay.open{display:flex}
    .yt-player-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;padding-top:calc(env(safe-area-inset-top,0px)+16px)}
    .yt-player-title{font-size:15px;font-weight:600;color:#f1f1f1;flex:1;margin:0 16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .yt-close-btn{width:36px;height:36px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .yt-player-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:0 0 20px}
    .yt-player-wrap iframe{width:100%;max-width:960px;aspect-ratio:16/9;border:none;border-radius:12px}
    .add-modal{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px)}
    .add-modal.open{display:flex}
    .add-box{background:#18181f;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px;width:360px;max-width:92vw}
    .add-box h3{font-size:16px;font-weight:700;margin-bottom:6px}
    .add-box p{font-size:12px;color:#666;margin-bottom:18px}
    .add-box input{width:100%;background:#0f0f0f;border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;font-size:13px;color:#fff;font-family:inherit;outline:none;margin-bottom:8px}
    .add-status{font-size:12px;min-height:16px;margin-bottom:14px;text-align:center;color:#888}
    .add-actions{display:flex;gap:8px}
    .btn-cancel,.btn-add{flex:1;padding:10px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px}
    .btn-cancel{background:transparent;color:#666;border:1px solid rgba(255,255,255,0.08)}
    .btn-add{background:#FF0000;color:#fff;border:none;font-weight:700}
    .empty-state{text-align:center;padding:60px 20px;color:#555}
    .section-title{font-size:17px;font-weight:800;padding:0 4px 14px}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:rgba(9,9,11,0.85);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.08);z-index:150;display:flex;align-items:center;justify-content:space-around;padding:0 24px;padding-bottom:env(safe-area-inset-bottom,0px)}
    .bottom-bar button{background:none;border:none;color:#71717a;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
    .bottom-bar button.active{color:#818cf8}
  </style>
</head>
<body>
  <div class="yt-sticky-top">
    <header class="glass-nav yt-header">
      <a href="index.html" class="yt-logo-link flex items-center gap-2">
        <div class="w-10 h-10 bg-gradient-to-tr from-amber-400 via-yellow-400 to-yellow-500 rounded-[12px] flex items-center justify-center flex-shrink-0">
          <div class="w-7 h-7 bg-zinc-900 rounded-[8px] flex items-center justify-center"><svg width="12" height="12" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3" fill="#fbbf24"/></svg></div>
        </div>
        <span class="yt-logo-text text-transparent bg-clip-text bg-gradient-to-r from-white via-yellow-100 to-amber-300 font-extrabold text-xl">PlayTime</span>
      </a>
      <div class="yt-search">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="검색" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="yt-search-btn" onclick="doSearch()" type="button" aria-label="검색"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </div>
      <div class="yt-header-actions">
        <button id="login-ui-btn" class="yt-icon-btn" type="button" aria-label="로그인" onclick="openLoginModal()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="yt-icon-btn yt-icon-btn-add" onclick="openAddModal()" type="button" aria-label="채널 추가">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
    </header>
    <div class="yt-cats" id="cat-tabs">
      <button class="yt-cat active" onclick="filterCat('all',this)" type="button">전체</button>
      <button class="yt-cat" onclick="filterCat('custom',this)" type="button">내 채널</button>
      <button class="yt-cat" onclick="filterCat('news',this)" type="button">뉴스</button>
      <button class="yt-cat" onclick="filterCat('opinion',this)" type="button">시사</button>
      <button class="yt-cat" onclick="filterCat('movie',this)" type="button">영화</button>
      <button class="yt-cat" onclick="filterCat('entertainment',this)" type="button">오락/예능</button>
      <button class="yt-cat" onclick="filterCat('music',this)" type="button">음악</button>
    </div>
  </div>
  <main class="yt-main" id="yt-main"><div class="yt-loading"><div class="yt-spinner"></div><span>채널 영상을 불러오는 중...</span></div></main>
  <div class="yt-player-overlay" id="player-overlay">
    <div class="yt-player-header">
      <button class="yt-close-btn" onclick="closePlayer()" type="button" aria-label="닫기"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="yt-player-title" id="player-title"></div>
    </div>
    <div class="yt-player-wrap"><iframe id="yt-iframe" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>
  </div>
  <div class="add-modal" id="add-modal">
    <div class="add-box">
      <h3>YouTube 채널 추가</h3>
      <p>채널명, @핸들, 또는 YouTube 채널 URL을 입력하세요</p>
      <input type="text" id="ch-input" placeholder="예: @JTBC_news 또는 UCxxxxxxxx" onkeydown="if(event.key==='Enter')addChannel()">
      <p class="add-status" id="add-status"></p>
      <div class="add-actions"><button class="btn-cancel" onclick="closeAddModal()" type="button">취소</button><button class="btn-add" onclick="addChannel()" type="button">추가하기</button></div>
    </div>
  </div>
  <div class="add-modal" id="login-modal">
    <div class="add-box">
      <h3>YouTube 로그인 안내</h3>
      <p>프리미엄 혜택(광고 제거) 및 내 채널 연동을 위해 유튜브 계정으로 로그인합니다.</p>
      <div class="add-actions"><button class="btn-cancel" onclick="closeLoginModal()" type="button">취소</button><button class="btn-add" onclick="proceedYouTubeLogin()" style="background:#3b82f6" type="button">로그인 하러가기</button></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button onclick="window.location.href='index.html'" type="button"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span style="font-size:10px;font-weight:700">홈</span></button>
    <button class="active" onclick="window.location.href='youtube.html'" type="button"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg><span style="font-size:10px;font-weight:700">유튜브</span></button>
    <button onclick="window.location.href='ytmusic.html'" type="button"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M12 12l3 3"/></svg><span style="font-size:10px;font-weight:700">YT Music</span></button>
    <button onclick="window.location.href='index.html?tab=favorites'" type="button"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span style="font-size:10px;font-weight:700">즐겨찾기</span></button>
  </div>
  <script type="module" src="src/youtube.js"></script>
</body>
</html>
