<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map - Hans</title>
    <link rel="icon" type="image/png" href="favicon.png?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="header_loader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Outfit', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        dyo: { bg: '#F2F2F2', dark: '#1C1D20', accent: '#5D6BF8' }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-color: #F2F2F2;
            --glass-bg: #FFFFFF;
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #1C1D20;
            --text-secondary: rgba(28, 29, 32, 0.5);
            --accent-blue: #5D6BF8;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-red: #FF3B30;
            --accent-neon: #e1ff00;
            --radius-premium: 24px;
            --card-bg: #FFFFFF;
            --nav-bg: #FFFFFF;
            --input-bg: #F8F8F8;
            --dyo-dark: #1C1D20;
            --dyo-bg: #F2F2F2;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 20px 50px rgba(0, 0, 0, 0.06);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            --item-hover: rgba(0,0,0,0.03);
        }
        html.dark {
            --bg-color: #0F0F12;
            --glass-bg: #1A1A24;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #E8E8F0;
            --text-secondary: rgba(232, 232, 240, 0.5);
            --accent-blue: #6C7BFF;
            --accent-green: #10b981;
            --accent-purple: #a78bfa;
            --accent-red: #FF4D4D;
            --accent-neon: #e1ff00;
            --card-bg: #1A1A24;
            --nav-bg: #1A1A24;
            --input-bg: #13131C;
            --dyo-dark: #E8E8F0;
            --dyo-bg: #2A2A3A;
            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 20px 50px rgba(0, 0, 0, 0.6);
            --item-hover: rgba(255,255,255,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit','Inter',sans-serif; }
        html, body { height:100%; background:var(--bg-color); color:var(--text-primary); overflow-x:hidden; overflow-y:auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.1); border-radius:10px; }
        html.dark ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

        #mmContainer {
            position:relative; flex:1; overflow:hidden;
            border-radius:var(--radius-premium); margin: 0 0 1.5rem;
            background:var(--card-bg); border:1px solid var(--glass-border);
            box-shadow:var(--shadow-sm); min-height:calc(100vh - 240px);
            transition: var(--transition);
        }
        #mmCanvas { display:block; width:100%; height:100%; cursor:crosshair; }
        #nodeInput {
            display:none; position:absolute; z-index:50;
            padding:8px 16px; border-radius:12px; border:2px solid var(--accent-blue);
            background:var(--card-bg); color:var(--text-primary);
            font:bold 14px Outfit,sans-serif; outline:none; min-width:150px;
            box-shadow:0 10px 30px rgba(93,107,248,0.2);
        }

        .mm-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin: 0 0 12px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            width: 100%;
            box-sizing: border-box;
            overflow-x: auto;
            min-height: 64px;
        }
        .mm-toolbar::-webkit-scrollbar { height: 6px; }
        .mm-toolbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .mm-toolbar button {
            display:flex; align-items:center; gap:4px;
            padding:6px 10px; border-radius:10px; border:1px solid var(--glass-border);
            background:transparent; color:var(--text-primary); font:700 10px Outfit,sans-serif;
            cursor:pointer; transition:var(--transition); text-transform:uppercase; letter-spacing:0.05em;
            white-space:nowrap;
        }
        .mm-toolbar button:hover { background:var(--item-hover); transform: translateY(-1px); }
        .mm-toolbar button svg { width:12px; height:12px; }
        .mm-sep { width:1px; height:20px; background:var(--glass-border); margin:0 4px; }
        .mm-label { font:800 10px Outfit,sans-serif; color:var(--text-secondary); padding:0 8px; text-transform:uppercase; letter-spacing:0.1em; }
        #selLabel { font:bold 12px Outfit,sans-serif; color:var(--accent-blue); max-width:140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* Zoom controls */
        .zoom-bar {
            position:absolute; bottom:24px; right:24px; z-index:40;
            display:flex; align-items:center; gap:4px; padding:8px 12px;
            background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius:14px; box-shadow:var(--shadow-sm);
        }
        .zoom-bar button {
            width:32px; height:32px; display:flex; align-items:center; justify-content:center;
            border-radius:10px; border:none; background:transparent;
            color:var(--text-primary); cursor:pointer; font-size:18px; transition:all 0.2s;
        }
        .zoom-bar button:hover { background:var(--item-hover); color:var(--accent-blue); }
        #zoomLevel { font:800 11px Outfit,sans-serif; color:var(--text-primary); min-width:40px; text-align:center; }

        /* Help badge */
        .help-badge {
            position:absolute; bottom:24px; left:24px; z-index:40;
            padding:12px 18px; background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius:16px; box-shadow:var(--shadow-sm);
            font:600 11px Outfit,sans-serif; color:var(--text-secondary); line-height:1.7;
        }

        /* Modal */
        .mm-modal {
            display:none; position:fixed; inset:0; z-index:100;
            background:rgba(0,0,0,0.4); backdrop-filter: blur(8px); align-items:center; justify-content:center;
        }
        html.dark .mm-modal { background:rgba(0,0,0,0.6); }
        .mm-modal-box {
            background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius:24px; padding:32px; min-width:400px; max-width:500px;
            box-shadow:var(--shadow-md);
        }
        .mm-modal-box h3 {
            font:900 18px Outfit,sans-serif; color:var(--text-primary); margin-bottom:20px; letter-spacing: -0.02em;
        }
        .mm-modal-box textarea {
            width:100%; height:160px; padding:16px; border-radius:16px;
            border:1px solid var(--glass-border); background:var(--input-bg);
            color:var(--text-primary); font:500 14px Outfit,sans-serif; resize:vertical; outline:none; transition: var(--transition);
        }
        .mm-modal-box textarea:focus { border-color:var(--accent-blue); box-shadow: 0 0 0 4px rgba(93, 107, 248, 0.1); }
        .mm-modal-btns { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
        .mm-modal-btns button {
            padding:10px 24px; border-radius:12px; border:1px solid var(--glass-border);
            background:transparent; color:var(--text-primary); font:800 12px Outfit,sans-serif;
            cursor:pointer; transition:var(--transition); text-transform: uppercase; letter-spacing: 0.05em;
        }
        .mm-modal-btns button.primary { background:var(--text-primary); color:var(--bg-color); border:none; }
        .mm-modal-btns button:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }

        /* Confirm modal */
        .confirm-box {
            background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius:24px; padding:32px; text-align:center; min-width:340px;
            box-shadow:var(--shadow-md);
        }
        .confirm-box p { font:700 15px Outfit,sans-serif; color:var(--text-primary); margin-bottom:24px; line-height:1.6; }
        #confirmOk { background:var(--accent-red)!important; color:#fff!important; border:none!important; }

        /* Button semantic colors */
        .mm-btn-add { background:var(--accent-neon)!important; color:#000!important; border:none!important; box-shadow: 0 8px 20px -8px rgba(225, 255, 0, 0.5); }
        .mm-btn-add:hover { background:#d4f000!important; transform: translateY(-2px)!important; box-shadow: 0 12px 25px -8px rgba(225, 255, 0, 0.6)!important; }

        .mm-btn-delete { color:var(--accent-red)!important; border-color:rgba(255,59,48,0.2)!important; }
        .mm-btn-delete:hover { background:var(--accent-red)!important; color:#fff!important; border-color:var(--accent-red)!important; }

        .mm-btn-rename { color:var(--accent-green)!important; border-color:rgba(16,185,129,0.2)!important; }
        .mm-btn-rename:hover { background:var(--accent-green)!important; color:#fff!important; border-color:var(--accent-green)!important; }

        .mm-btn-memo { color:var(--accent-purple)!important; border-color:rgba(139,92,246,0.2)!important; }
        .mm-btn-memo:hover { background:var(--accent-purple)!important; color:#fff!important; border-color:var(--accent-purple)!important; }

        .mm-btn-color { color:var(--accent-blue)!important; border-color:rgba(93,107,248,0.2)!important; }
        .mm-btn-color:hover { background:var(--accent-blue)!important; color:#fff!important; border-color:var(--accent-blue)!important; }

        .mm-btn-bridge { color:var(--text-primary)!important; border-color:var(--glass-border)!important; }
        .mm-btn-bridge:hover { background:var(--item-hover)!important; }
        .mm-btn-bridge.active { background:var(--accent-blue)!important; color:#fff!important; border-color:var(--accent-blue)!important; }

        /* Sidebar layout adjustments */
        .mm-layout { display:flex; flex:1; overflow:hidden; position:relative; }
        .mm-sidebar {
            width:260px; background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius: var(--radius-premium);
            margin-right: 1rem; margin-bottom: 1.5rem;
            display:flex; flex-direction:column; transition:all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index:20; box-shadow: var(--shadow-sm);
        }
        .mm-sidebar.collapsed {
            transform:translateX(-280px);
            position:absolute; height:calc(100% - 1.5rem);
        }
        .mm-sidebar-toggle {
            position:absolute; top:50%; right:-12px; transform:translateY(-50%);
            width:24px; height:48px; background:var(--card-bg); border:1px solid var(--glass-border);
            border-radius:8px; display:flex; align-items:center; justify-content:center;
            cursor:pointer; color:var(--text-secondary); box-shadow:var(--shadow-sm);
            z-index:21; transition:all 0.3s;
        }
        .mm-sidebar-toggle:hover { color:var(--accent-blue); width:22px; right:-22px; }
        .mm-workspace { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div class="container">
        <div id="header-placeholder"></div>

        <div class="mm-layout">
        <!-- Sidebar -->
        <div id="mmSidebar" class="mm-sidebar">
            <div class="p-6 flex justify-between items-center border-b border-glass-border">
                <h3 class="font-black text-[10px] text-text-primary uppercase tracking-[0.2em]">MindMap Pages</h3>
                <button onclick="MM.addNewPage()" class="w-7 h-7 flex items-center justify-center bg-accent-neon text-black rounded-lg font-black text-lg leading-none hover:scale-110 transition-transform shadow-lg shadow-accent-neon/20" title="새 페이지 추가">+</button>
            </div>
            <div id="pageList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Page items injected here -->
            </div>
            
            <div class="mm-sidebar-toggle" onclick="toggleMMSidebar()">
                <svg id="mmSidebarIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="15 18 9 12 15 6"/></svg>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="mm-workspace">
            <!-- Toolbar -->
        <div class="mm-toolbar">
            <div class="flex items-center gap-1">
                <button class="mm-btn-add" onclick="mmAddChild()" title="하위 노드 추가 (Tab)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add
                </button>
                <button class="mm-btn-delete" onclick="mmDelete()" title="삭제 (Delete)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete
                </button>
                <button class="mm-btn-rename" onclick="mmRename()" title="이름 변경 (F2 / 더블클릭)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Rename
                </button>
                <button class="mm-btn-memo" onclick="mmMemo()" title="메모">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Memo
                </button>
                <button class="mm-btn-color" onclick="mmColor()" title="노드 색상 변경">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
                    Color
                </button>
                <div class="mm-sep"></div>
                <button id="bridgeBtn" class="mm-btn-bridge" onclick="mmBridge()" title="브릿지 연결 (노드↔노드)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
                    Bridge
                </button>
                <div class="mm-sep"></div>
                <div id="nodeToolbar" style="opacity:0; pointer-events:none; display:flex; align-items:center; gap:6px; transition:opacity 0.2s;">
                    <span class="mm-label">Selected:</span>
                    <span id="selLabel">-</span>
                </div>
                <div id="edgeToolbar" style="opacity:0; pointer-events:none; display:flex; align-items:center; gap:6px; transition:opacity 0.2s;">
                    <span class="mm-label">Edge:</span>
                    <button onclick="mmEdgeText()" title="연결선 텍스트 편집" style="padding:4px 10px;font-size:10px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Text
                    </button>
                    <button onclick="mmEdgeStyle()" title="연결선 스타일 변경" style="padding:4px 10px;font-size:10px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><line x1="3" y1="12" x2="21" y2="12"/></svg>
                        Style
                    </button>
                    <button onclick="mmEdgeDelete()" title="브릿지 삭제" style="padding:4px 10px;font-size:10px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                        Del
                    </button>
                </div>
            </div>
            <div class="flex items-center gap-[20px]">
                <button class="mm-btn-export" onclick="mmExport()" title="JSON 내보내기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Export
                </button>
                <button class="mm-btn-import" onclick="mmImport()" title="JSON 가져오기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Import
                </button>
            </div>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none">

    <!-- Canvas -->
    <div id="mmContainer" style="flex:1; position:relative; overflow:hidden;">
        <canvas id="mmCanvas"></canvas>
        <input type="text" id="nodeInput">

        <!-- Zoom -->
        <div class="zoom-bar">
            <button onclick="mmZoomOut()" title="축소">−</button>
            <span id="zoomLevel">100%</span>
            <button onclick="mmZoomIn()" title="확대">+</button>
            <div class="mm-sep" style="height:18px;margin:0 2px;"></div>
            <button onclick="mmFit()" title="전체보기" style="font-size:12px;">⊞</button>
        </div>

        <!-- Help -->
        <div class="help-badge">
            <b>Tab</b> 하위 노드 추가 &nbsp;|&nbsp; <b>Del</b> 삭제 &nbsp;|&nbsp; <b>F2 / 더블클릭</b> 이름 변경<br>
            <b>Alt+드래그</b> 이동 &nbsp;|&nbsp; <b>스크롤</b> 줌 &nbsp;|&nbsp; <b>연결선 더블클릭</b> 텍스트 편집
        </div>
    </div>
        </div> <!-- End mm-workspace -->
    </div> <!-- End mm-layout -->
    </div> <!-- End container -->

    <!-- Memo Modal -->
    <div id="memoModal" class="mm-modal">
        <div class="mm-modal-box">
            <h3 id="memoTitle">메모</h3>
            <textarea id="memoText" placeholder="메모를 입력하세요..."></textarea>
            <div class="mm-modal-btns">
                <button id="memoCancelBtn">취소</button>
                <button id="memoSaveBtn" class="primary">저장</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="mm-modal">
        <div class="confirm-box">
            <p id="confirmMsg"></p>
            <div class="mm-modal-btns">
                <button id="confirmCancel">취소</button>
                <button id="confirmOk">삭제</button>
            </div>
        </div>
    </div>

    <!-- Color Picker Modal -->
    <div id="colorModal" class="mm-modal">
        <div class="mm-modal-box" style="min-width:300px;">
            <h3>노드 색상 선택</h3>
            <div id="colorGrid"></div>
        </div>
    </div>

    <!-- Line Style Modal -->
    <div id="lineStyleModal" class="mm-modal">
        <div class="mm-modal-box" style="min-width:280px;">
            <h3>연결선 스타일</h3>
            <div id="lineStyleList"></div>
            <div class="mm-modal-btns" style="margin-top:12px;">
                <button onclick="document.getElementById('lineStyleModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="mmToast"></div>

    <script src="mindmap.js"></script>
</body>
</html>
