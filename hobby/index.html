<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>취미생활 - 음악감상</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header glass-panel">
            <button id="settingsBtn" class="settings-btn" title="GitHub 설정"><i class="fas fa-cog"></i></button>
            <h1><i class="fas fa-compact-disc spin-icon"></i> Vibe Music Box</h1>
            <div class="time-display" id="currentTime">00:00</div>
        </header>

        <main class="main-content">
            <!-- Left panel: Search, result list, lyrics -->
            <section class="left-panel">
                <div class="search-box glass-panel">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" placeholder="노래 제목, 아티스트, 가사로 검색해보세요" autocomplete="off">
                    <button id="globalSearchBtn" class="search-btn" title="유튜브에서 직접 검색">
                        <i class="fab fa-youtube"></i> 검색
                    </button>
                </div>
                
                <div class="list-lyrics-wrapper">
                    <!-- Song List -->
                    <div class="song-list-container glass-panel">
                        <div class="list-tabs">
                            <button id="tabSearch" class="tab-btn active">
                            <i id="listIcon" class="fas fa-play-circle" style="color:var(--accent-color)"></i> 
                            <span id="listTitleLabel">플레이</span> <span class="badge" id="songCount">0</span></button>
                            <button id="tabPlaylist" class="tab-btn"><i class="fas fa-bookmark"></i> 내 보관함 <span class="badge" id="playlistCount">0</span></button>
                        </div>
                        <ul id="songList" class="song-list">
                            <!-- JS injected -->
                        </ul>
                        <div id="noResults" class="no-results" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i>
                            <p>내 데이터베이스에 노래가 없습니다.</p>
                            <button id="globalSearchBtn" class="glass-btn"><i class="fas fa-globe"></i> 전체 유튜브 검색</button>
                        </div>
                        <div id="loading" class="loading-state" style="display: none;">
                            <div class="spinner"></div>
                            <p>유튜브에서 노래를 찾는 중...</p>
                        </div>
                    </div>

                    <!-- Lyrics Area -->
                    <div class="lyrics-container glass-panel" id="lyricsContainer" style="display: none;">
                        <div class="section-title lyrics-header">
                            <div><i class="fas fa-align-left"></i> <span id="lyricsTitle">가사</span></div>
                            <button id="closeLyricsBtn" class="icon-btn"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="lyrics-content" id="lyricsContent">
                            <!-- Lyrics here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Right panel: YouTube player -->
            <section class="right-panel glass-panel">
                <div class="player-wrapper">
                    <div class="player-header">
                        <h2><i class="fab fa-youtube" style="color:#ff0000;"></i> Now Playing</h2>
                        <div class="equalizer" id="equalizer" style="display: none;">
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                            <span class="bar"></span>
                        </div>
                    </div>
                    
                    <div class="current-song-info" id="currentSongInfo" style="display: none;">
                        <div class="album-art-placeholder">
                            <i class="fas fa-music"></i>
                        </div>
                        <div class="info-text">
                            <h3 id="currentTitle">Song Title</h3>
                            <p id="currentArtist">Artist Name</p>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div id="playerEmptyState" class="empty-state">
                        <div class="pulse-ring"></div>
                        <i class="fas fa-play-circle"></i>
                        <p>목록에서 듣고 싶은 노래를 선택하세요</p>
                    </div>

                    <!-- YouTube Iframe -->
                    <div id="youtubePlayerContainer" class="youtube-player-container" style="display: none;">
                        <iframe id="youtubeIframe" width="100%" height="100%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
    <!-- GitHub Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class="fab fa-github"></i> GitHub 동기화 설정</h2>
                <button class="modal-close" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-key"></i> GitHub Token</label>
                    <input type="password" id="ghToken" placeholder="Personal Access Token을 입력하세요">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-database"></i> Repository</label>
                    <input type="text" id="ghRepo" value="uzenkaze/vibe">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code-branch"></i> Branch</label>
                    <input type="text" id="ghBranch" value="main">
                </div>
                <p class="settings-hint">설명: 저장된 보관함은 `hobby/playlist.json` 경로에 자동 저장됩니다.</p>
            </div>
            <div class="modal-footer">
                <button class="glass-btn save-btn" id="saveSettingsBtn">저장하기</button>
            </div>
        </div>
    </div>
    <!-- GitHub Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2><i class="fab fa-github"></i> GitHub 동기화 설정</h2>
                <button class="modal-close" id="closeSettingsBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-key"></i> GitHub Token</label>
                    <input type="password" id="ghToken" placeholder="Personal Access Token을 입력하세요">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-database"></i> Repository</label>
                    <input type="text" id="ghRepo" value="uzenkaze/vibe">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code-branch"></i> Branch</label>
                    <input type="text" id="ghBranch" value="main">
                </div>
                <p class="settings-hint">설명: 보관함은 `hobby/playlist.json`에 자동 저장됩니다.</p>
            </div>
            <div class="modal-footer">
                <button class="glass-btn save-btn" id="saveSettingsBtn">저장하기</button>
            </div>
        </div>
    </div>
</body>
</html>
