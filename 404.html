<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Vibe Portal</title>
    <script type="text/javascript">
        // Capture the 404 request path and redirect to the root index.html with a query param 'p'
        // This is a standard, robust solution for SPA clean URLs on GitHub Pages.
        var pathSegmentsToKeep = window.location.pathname.startsWith('/vibe/') ? 1 : 0;
        
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
            '/?p=' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    Redirecting to Vibe Portal...
</body>
</html>
